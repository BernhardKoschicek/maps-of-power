<style>
  .grid {
    position: relative;
  }

  .item {
    display: block;
    position: absolute;
    width: 100%;
    z-index: 1;
  }

  .item.muuri-item-dragging {
    z-index: 3;
  }

  .item.muuri-item-releasing {
    z-index: 2;
  }

  .item.muuri-item-hidden {
    z-index: 0;
  }

  .item-content {
    position: relative;
    width: 100%;
    height: 100%;
  }

  @media (min-width: 576px) {
    .item {
      width: 33.333%;
    }
  }

  @media (min-width: 768px) {
    .item {
      width: 25%;
    }
  }
</style>
<section>
  <h2 class="text-primary display-5 text-center">{{ _('events') }}</h2>
  <div class="container py-2">
    <div class="grid">
      {% for event in events %}
        <div class="item p-3">
          <div class="item-content">
            <div class="card border-primary">
              <img src="{{ url_for('static', filename='images/' + event['icon'], v=ASSETS_VERSION) }}"
                   class="card-img-top"
                   alt="{{ event['id'] }} Image"
                   onload="refreshGrid()">
              <div class="card-body">
                <h3 class="card-title fs-5">{{ event['title'] }}</h3>
                <p class="card-text">{{ event['description'] }}</p>
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>

<script>
  let grid;

  function refreshGrid() {
    if (grid) {
      grid.refreshItems().layout();
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    grid = new Muuri('.grid', {
      dragEnabled: false,
      layout: {
        fillGaps: true
      }
    });

    // Erneutes Layout, wenn alle Bilder geladen sind (Sicherheitsnetz)
    window.addEventListener('load', function () {
      grid.refreshItems().layout();
    });
  });
</script>
